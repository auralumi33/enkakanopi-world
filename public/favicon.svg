<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- favicon-scale rendering of EnkaMark (closed ring, single poppy bloom,
       no character/orbit-dots/triad — those collapse to mud below ~90px).
       Hex values hardcoded (static asset, no CSS custom properties
       available): ring #2a251d (--ink), petal #e46b6b (poppy), heart
       #f7f2e7 (paper). No feTurbulence filter at this size (unreliable at
       16-24px across browsers) — the bold stroke-width alone carries the
       brushed weight. Keep in sync by hand with EnkaMark.astro's
       ring="closed" hold="bloom" accent="poppy" path data if redrawn. -->
  <path d="M 62 12 C 44 8, 24 16, 14 34 C 6 52, 12 74, 30 84 C 48 92, 72 84, 82 66 C 88 54, 88 38, 78 26"
    stroke="#2a251d" stroke-width="6.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <circle cx="72" cy="19" r="3.2" fill="#2a251d" opacity="0.75"/>
  <g transform="translate(50 46)">
    <g fill="#e46b6b">
      <path d="M0 -14 C 4.8 -13.2, 5.6 -6.8, 0 -4.4 C -5.6 -6.8, -4.8 -13.2, 0 -14 Z"/>
      <path d="M9.2 -8 C 13.2 -5, 11.2 1.8, 5.6 0 C 3.2 -3.2, 5.6 -7.6, 9.2 -8 Z"/>
      <path d="M6.4 5.2 C 1 8.6, -6.4 5.8, -4.4 0.4 C 0.6 -2.2, 7.4 0.4, 6.4 5.2 Z"/>
      <path d="M-9.2 3.6 C -13.2 0, -11.2 -6.8, -5.8 -5.6 C -3.2 -2.8, -5.8 1.8, -9.2 3.6 Z"/>
      <path d="M-8.8 -8 C -4.8 -9.2, -1.2 -5.2, -3.2 -1.2 C -8 -0.4, -11.2 -5.2, -8.8 -8 Z"/>
    </g>
    <circle cx="0" cy="-3" r="4.4" fill="#f7f2e7"/>
  </g>
</svg>
