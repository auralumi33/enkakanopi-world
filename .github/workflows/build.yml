name: build

# Builds the static site on every push and PR so a broken build never lands.
# Actions pinned to full commit SHAs — a tag can be rewritten upstream; a SHA
# cannot. Dependabot maintains these via .github/dependabot.yml.
#
# The deploy step is intentionally left commented — Vercel is auto-wired via
# its Git integration; the Pages path is stubbed below.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege default at the workflow level; every job re-declares
# only what it actually needs.
permissions: {}

# Prevent multiple concurrent runs on the same ref; cancel in-progress on a
# new push. Saves minutes and avoids racy artifact uploads.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout (pinned SHA · v7)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node (pinned SHA · v6)
        # Node 22 required — astro 6 declares engines "^>=22.12.0". Node 20
        # was fine for astro 5; the 5→6 bump (SUCCESSION §12.3) raised the floor.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Install (frozen lockfile)
        run: npm ci

      - name: Guard — the mechanical mirror (secrets + off-register + lightness)
        run: npm run guard

      - name: Build
        run: npm run build

      - name: Upload build artifact (pinned SHA · v7)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: site
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # ── deploy (stubbed) ────────────────────────────────────────────────
  # Vercel: connect the repo in the Vercel dashboard — its Git integration
  # builds + deploys automatically, no workflow needed here.
  #
  # GitHub Pages: uncomment the job below and set Settings → Pages → Source:
  # "GitHub Actions". Pin any new action SHAs before uncommenting.
