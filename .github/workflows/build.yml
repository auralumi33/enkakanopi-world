name: build

# Builds the static site on every push and PR so a broken build never lands.
# The deploy step is intentionally left commented until a host is connected
# (Vercel is auto-wired via its Git integration; the Pages path is stubbed below).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Guard — the mechanical mirror (secrets + off-register)
        run: npm run guard
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/
          if-no-files-found: error

  # ── deploy (stubbed) ────────────────────────────────────────────────
  # Vercel: connect the repo in the Vercel dashboard — its Git integration
  # builds + deploys automatically, no workflow needed here.
